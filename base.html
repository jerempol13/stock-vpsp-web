<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}Stock VPSP{% endblock %}</title>
<style>
:root{--red:#c8102e;--blue:#174ea6;--green:#198754;--bg:#f5f7fb;--text:#172033;--muted:#657085;--border:#d8deea}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:var(--text)}header{background:#fff;border-bottom:4px solid var(--red);padding:14px 16px;position:sticky;top:0;z-index:2}.wrap{max-width:980px;margin:auto}.brand{font-weight:850;font-size:1.15rem}.nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.nav a{color:var(--blue);text-decoration:none;font-weight:700}main{max-width:980px;margin:auto;padding:16px}.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 4px 18px rgba(20,35,60,.06)}h1{margin-top:0;font-size:1.8rem}h2{margin:.2rem 0}.muted{color:var(--muted)}label{display:block;font-weight:750;margin:15px 0 6px}input,select,button{width:100%;font:inherit;padding:13px;border-radius:10px;border:1px solid #bfc8d8;background:#fff}input[readonly]{background:#edf1f7;font-weight:750}.btn,button{display:inline-block;width:auto;border:0;color:#fff;background:var(--blue);font-weight:800;text-decoration:none;padding:12px 15px;border-radius:10px;cursor:pointer}.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.gray{background:#596579}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:16px}.flash{padding:12px 14px;border-radius:10px;margin-bottom:12px;font-weight:650}.flash.success{background:#dff4e8;color:#135c36}.flash.error{background:#fde3e6;color:#851b2f}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:13px}.stock{font-size:1.45rem;font-weight:850}.qr{max-width:270px;width:100%}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:9px;border-bottom:1px solid var(--border);font-size:.92rem}@media(max-width:650px){h1{font-size:1.55rem}.btn,button{width:100%;text-align:center}table{display:block;overflow-x:auto;white-space:nowrap}}
</style></head><body><header><div class="wrap"><div class="brand">🚑 Gestion Stock VPSP</div><nav class="nav"><a href="{{ url_for('home') }}">Stock</a><a href="{{ url_for('history') }}">Historique</a><a href="{{ url_for('qrcodes_pdf') }}">PDF QR codes</a></nav></div></header><main>{% with messages=get_flashed_messages(with_categories=true) %}{% for category,message in messages %}<div class="flash {{category}}">{{message}}</div>{% endfor %}{% endwith %}{% block content %}{% endblock %}</main></body></html>
