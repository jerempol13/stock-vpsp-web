services:
  - type: web
    name: gestion-stock-qr
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/stock.db
    disk:
      name: stock-data
      mountPath: /var/data
      sizeGB: 1
