{% extends 'base.html' %}{% block title %}Mouvement enregistré{% endblock %}{% block content %}<div class="card"><h1>✅ Mouvement enregistré</h1>{% if product %}<p><strong>{{product.nom}}</strong> — {{lot}}</p>{% endif %}<div class="actions"><a class="btn" href="{{url_for('home')}}">Retour au stock</a>{% if product %}<a class="btn {{'green' if movement_type=='entree' else 'red'}}" href="{{url_for(movement_type,product_id=product.id)}}">Nouvelle {{movement_type}}</a>{% endif %}</div></div>{% endblock %}
