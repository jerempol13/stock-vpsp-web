<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Gestion de stock{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --panel: #ffffff;
            --text: #172033;
            --muted: #6b7280;
            --border: #d8deea;
            --primary: #1f6feb;
            --success: #18864b;
            --danger: #c9302c;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        header {
            background: #0d1b2a;
            color: white;
            padding: 1rem;
        }
        header .wrap, main {
            max-width: 1000px;
            margin: auto;
        }
        nav {
            display: flex;
            gap: .75rem;
            flex-wrap: wrap;
            margin-top: .75rem;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: .45rem .7rem;
            border: 1px solid rgba(255,255,255,.3);
            border-radius: .5rem;
        }
        main { padding: 1rem; }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: .8rem;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 14px rgba(16,24,40,.05);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1rem;
        }
        label {
            display: block;
            font-weight: 650;
            margin: .8rem 0 .35rem;
        }
        input, select, button {
            width: 100%;
            padding: .8rem;
            border-radius: .55rem;
            border: 1px solid var(--border);
            font-size: 1rem;
        }
        input[readonly] { background: #eef2f7; }
        button, .button {
            display: inline-block;
            width: auto;
            border: 0;
            background: var(--primary);
            color: white;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            padding: .75rem 1rem;
            border-radius: .55rem;
        }
        .button.success { background: var(--success); }
        .button.danger { background: var(--danger); }
        .button.secondary { background: #4b5563; }
        .actions {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            margin-top: .75rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: .7rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
            vertical-align: top;
        }
        .flash {
            padding: .8rem;
            border-radius: .55rem;
            margin-bottom: .8rem;
        }
        .flash.success { background: #dff6e9; color: #125b34; }
        .flash.error { background: #fde2e1; color: #84201d; }
        .stock {
            font-size: 1.6rem;
            font-weight: 800;
        }
        .muted { color: var(--muted); }
        .qr {
            max-width: 260px;
            width: 100%;
            border: 1px solid var(--border);
            border-radius: .5rem;
        }
        @media (max-width: 650px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { border-bottom: 1px solid var(--border); padding: .7rem 0; }
            td { border: 0; padding: .3rem 0; }
        }
    </style>
</head>
<body>
<header>
    <div class="wrap">
        <strong>Gestion de stock par QR code</strong>
        <nav>
            <a href="{{ url_for('index') }}">Stock</a>
            <a href="{{ url_for('add_product') }}">Ajouter un produit</a>
            <a href="{{ url_for('history') }}">Historique</a>
        </nav>
    </div>
</header>
<main>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
